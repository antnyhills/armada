---
name: Build disk image

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  DEFAULT_TAG: "latest"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build disk image
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read

    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        run: |
          set -euxo pipefail
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            containernetworking-plugins \
            curl \
            jq \
            pigz \
            podman \
            python3

      - name: Check build recipes
        uses: ublue-os/just-action@bda593098a84a84973b002b4377709166a68be52 # v2

      - name: Build Armada image
        run: |
          set -euxo pipefail
          JUST_BIN=$(command -v just)
          sudo git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          sudo "${JUST_BIN}" build "localhost/${IMAGE_NAME}" "${DEFAULT_TAG}"
          sudo "${JUST_BIN}" build-armada-image "localhost/${IMAGE_NAME}" "${DEFAULT_TAG}"
          sudo chown -R "$(id -u):$(id -g)" output
          IMG=$(find output -maxdepth 1 -name 'armada-*.img.gz' -type f -print -quit)
          sha256sum "${IMG}" > "${IMG}.sha256"
          ls -lh "${IMG}" "${IMG}.sha256"

      - name: Upload disk image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: armada-disk-image
          path: |
            output/armada-*.img.gz
            output/armada-*.img.gz.sha256
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true
