ARMADA_DEVICE_ID=unknown
ARMADA_DEVICE_NAME=unknown
ARMADA_SOC_CLASS=

ARMADA_PRIMARY_CONNECTOR=
# Backlight Steam brightness writes are steered to. Only needed on devices
# with more than one backlight (Steam grabs the first one it finds).
ARMADA_PRIMARY_BACKLIGHT=
# Set on dual-screen devices; the desktop session extends onto this output.
ARMADA_SECONDARY_CONNECTOR=
# Input device names used to pin each touchscreen to its own output in the
# desktop session (only needed when a secondary connector is set).
ARMADA_PRIMARY_TOUCHSCREEN=
ARMADA_SECONDARY_TOUCHSCREEN=
ARMADA_PANEL_TYPE=internal
ARMADA_PANEL_ORIENTATION=normal
ARMADA_PANEL_NATIVE_WIDTH=
ARMADA_PANEL_NATIVE_HEIGHT=
ARMADA_PANEL_REFRESH_RATES=
ARMADA_GAMESCOPE_USE_ROTATION_SHADER=0
# Empty lets gamescope use default scaling.
ARMADA_GAMESCOPE_FAKE_OUTPUT_MM=

# HDR is promoted by hdr-session-finalize only after the immutable device
# profile and every production artifact agree.  Defaults deliberately carry
# no display capability so unsupported devices retain their normal session.
ARMADA_HDR_PROFILE=
ARMADA_HDR_CAPABLE=0
ARMADA_HDR_OUTPUT_EOTF=
ARMADA_HDR_R_X=
ARMADA_HDR_R_Y=
ARMADA_HDR_G_X=
ARMADA_HDR_G_Y=
ARMADA_HDR_B_X=
ARMADA_HDR_B_Y=
ARMADA_HDR_W_X=
ARMADA_HDR_W_Y=
ARMADA_HDR_MAX_CLL=
ARMADA_HDR_MAX_FALL=
ARMADA_HDR_MIN_CLL=
ARMADA_HDR_SDR_WHITE=
ARMADA_HDR_PANEL_NATIVE_WIDTH_MM=
ARMADA_HDR_PANEL_NATIVE_HEIGHT_MM=
ARMADA_HDR_EDID_SHA256=

ARMADA_GAMEPAD_QUIRK=none
# fake = fake-suspend (real suspend hangs most SoCs); mem = suspend-to-RAM.
ARMADA_SUSPEND_MODE=fake
